services:
  infohub:
    build:
      context: .
      dockerfile: Dockerfile
    image: infohub-agent:local
    container_name: infohub-agent
    ports:
      - "8080:8080"
    environment:
      INFOHUB_CONFIG_PATH: /app/configs/config.example.json
      INFOHUB_HTTP_ADDR: :8080
    volumes:
      - ./configs/config.example.json:/app/configs/config.example.json:ro
      - ./data:/app/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: infohub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
